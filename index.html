<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table — วางแผนตารางเรียน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📅</span>
      <span class="logo-text">KU Table</span>
    </div>
    <div class="header-subtitle">วางแผนตารางเรียน</div>
    <div class="header-actions">
      <!-- THEME SWITCHER -->
      <div class="theme-group" id="theme-group">
        <button class="theme-btn" onclick="toggleThemePanel(event)" title="เปลี่ยนธีม">
          <span class="theme-btn-dot" id="theme-btn-dot"></span>
          <span id="theme-btn-label">ธีม</span>
          <span style="font-size:9px;opacity:.6">▾</span>
        </button>
        <div class="theme-panel hidden" id="theme-panel">
          <div class="theme-panel-title">เลือกธีม</div>
          <div class="theme-options" id="theme-options"></div>
        </div>
      </div>
      <button class="btn-outline btn-sm" onclick="clearPlanCourses()">🗑 ล้างทั้งหมด</button>
      <button class="btn-outline btn-sm" onclick="exportPlan()">📋 คัดลอก</button>
      <div class="export-group">
        <button class="btn-outline btn-sm" id="export-btn" onclick="toggleExportMenu(event)">
          ⬇ Export <span class="export-arrow">▾</span>
        </button>
        <div class="export-menu hidden" id="export-menu">
          <button onclick="exportAsImage('png')">🖼&nbsp; บันทึกเป็น PNG</button>
          <button onclick="exportAsImage('pdf')">📄&nbsp; บันทึกเป็น PDF</button>
        </div>
      </div>
      <button class="btn-primary btn-sm" onclick="openAddModal()">＋ เพิ่มวิชา</button>
    </div>
  </div>
</header>

<!-- HINT BAR -->
<div class="hint-bar">
  <span class="hint-desktop">คลิกที่ช่องว่างในตารางเพื่อเพิ่มวิชา &nbsp;•&nbsp; ลากวิชาเพื่อย้ายวัน/เวลา &nbsp;•&nbsp; ดับเบิลคลิกเพื่อแก้ไข</span>
  <span class="hint-mobile">แตะช่องว่างเพื่อเพิ่มวิชา &nbsp;•&nbsp; กดค้างแล้วลากเพื่อย้าย &nbsp;•&nbsp; แตะสองครั้งเพื่อแก้ไข</span>
</div>

<!-- TIMETABLE -->
<div class="timetable-container">
  <div id="plan-timetable"></div>
</div>

<!-- COURSE LIST -->
<div class="course-list-section">
  <h3 class="section-title">วิชาที่วางแผนไว้</h3>
  <div id="plan-course-list" class="course-list"></div>
</div>

<!-- ADD/EDIT COURSE MODAL -->
<div id="course-modal" class="modal-overlay hidden" onclick="closeModalOutside(event)">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="modal-title">เพิ่มวิชา</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <form class="modal-form" onsubmit="saveCourse(event)">
      <div class="form-group">
        <label>รหัสวิชา</label>
        <input type="text" id="f-code" placeholder="01418111" />
      </div>
      <div class="form-group">
        <label>Section</label>
        <input type="text" id="f-section" placeholder="450" />
      </div>
      <div class="form-group">
        <label>ชื่อวิชา <span class="required">*</span></label>
        <input type="text" id="f-name" placeholder="การโปรแกรมคอมพิวเตอร์" required />
      </div>
      <div class="form-group">
        <label>ห้องเรียน</label>
        <input type="text" id="f-room" placeholder="ST-108" />
      </div>
      <div class="form-row">
        <div class="form-group flex-1">
          <label>วัน <span class="required">*</span></label>
          <select id="f-day" required onchange="onDayChange(this.value)">
            <option value="">เลือกวัน</option>
            <option value="1">จันทร์</option>
            <option value="2">อังคาร</option>
            <option value="3">พุธ</option>
            <option value="4">พฤหัสบดี</option>
            <option value="5">ศุกร์</option>
            <option value="6">เสาร์</option>
          </select>
        </div>
        <div class="form-group flex-1">
          <label>เวลาเริ่ม <span class="required">*</span></label>
          <select id="f-start" required></select>
        </div>
        <div class="form-group flex-1">
          <label>เวลาสิ้นสุด <span class="required">*</span></label>
          <select id="f-end" required></select>
        </div>
      </div>
      <div class="form-group">
        <label>สีวิชา</label>
        <div class="color-picker" id="color-picker"></div>
      </div>
      <input type="hidden" id="f-id" />
      <div class="modal-actions">
        <button type="button" class="btn-outline" onclick="closeModal()">ยกเลิก</button>
        <button type="submit" class="btn-primary">บันทึก</button>
      </div>
    </form>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div id="delete-modal" class="modal-overlay hidden" onclick="closeDeleteModal(event)">
  <div class="modal-card modal-sm">
    <div class="modal-header">
      <h3>ลบวิชา</h3>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <p class="delete-msg">ต้องการลบวิชา "<span id="delete-course-name"></span>" ออกหรือไม่?</p>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeDeleteModal()">ยกเลิก</button>
      <button class="btn-danger" onclick="confirmDelete()">ลบ</button>
    </div>
  </div>
</div>

<script>
/* ===== THEME ENGINE ===== */
const THEMES = [
  { id: 'purple',   name: 'Purple Mall', sub: 'มินิมอล', swatch: 'linear-gradient(135deg,#6c47ff,#9b6bff)' },
  { id: 'midnight', name: 'Midnight',    sub: 'Dark Mode', swatch: 'linear-gradient(135deg,#1e1b4b,#6366f1)' },
  { id: 'sakura',   name: 'Sakura',      sub: 'สีชมพู', swatch: 'linear-gradient(135deg,#e8639a,#f59bbf)' },
  { id: 'ocean',    name: 'Ocean',        sub: 'ฟ้าใส', swatch: 'linear-gradient(135deg,#0ea5e9,#38bdf8)' },
  { id: 'forest',   name: 'Forest',       sub: 'เขียวธรรมชาติ', swatch: 'linear-gradient(135deg,#16a34a,#4ade80)' },
  { id: 'sunset',   name: 'Sunset',       sub: 'อบอุ่น', swatch: 'linear-gradient(135deg,#f97316,#fbbf24)' },
];

function applyTheme(id) {
  document.documentElement.setAttribute('data-theme', id);
  localStorage.setItem('ku-theme', id);
  const t = THEMES.find(x => x.id === id);
  if (!t) return;
  const dot = document.getElementById('theme-btn-dot');
  const lbl = document.getElementById('theme-btn-label');
  if (dot) dot.style.background = t.swatch;
  if (lbl) lbl.textContent = t.name;
  document.querySelectorAll('.theme-option').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === id);
  });
}

function buildThemePanel() {
  const container = document.getElementById('theme-options');
  if (!container) return;
  container.innerHTML = THEMES.map(t => `
    <div class="theme-option" data-theme="${t.id}" onclick="applyTheme('${t.id}');closeThemePanel()">
      <div class="theme-swatch" style="background:${t.swatch}"></div>
      <div>
        <div class="theme-option-name">${t.name}</div>
        <div class="theme-option-sub">${t.sub}</div>
      </div>
    </div>
  `).join('');
}

function toggleThemePanel(e) {
  e.stopPropagation();
  const panel = document.getElementById('theme-panel');
  panel.classList.toggle('hidden');
}
function closeThemePanel() {
  document.getElementById('theme-panel').classList.add('hidden');
}

document.addEventListener('click', e => {
  if (!document.getElementById('theme-group').contains(e.target)) closeThemePanel();
});

document.addEventListener('DOMContentLoaded', () => {
  buildThemePanel();
  const saved = localStorage.getItem('ku-theme') || 'purple';
  applyTheme(saved);
});
</script>
<script src="app.js"></script>
</body>
</html>
